[mypy]
# Only type-check the installable package, tests, and scripts.
# Exclude vault content directories that contain standalone utility scripts
# with duplicate module names (not part of the installable package).
files = src/, tests/, scripts/
exclude = (?x)(
    ^ARCHIVE_RK01/
    | ^DOCUMENTATION/
    | ^REGEOS_RG01/
    | ^MIRROR_MR01/
    | ^TEMPLATES_TP01/
    | ^TAGS_TA01/
    | ^SYSTEM_MAP_SM01/
    | ^ARCHIVAL_STACK/
    | ^CATALOGS_AND_INDEXES/
    | ^Users/
    | ^GATEWAY_GT01/
    | ^ANOMALIES_FL01/
    | ^FRAGMENTS_FR01/
    | ^NARRATIVES_NR01/
    | ^GAMEDESIGN_GD01/
    | ^WORKSHOPS_WR01/
    | ^PROJECT_MANAGEMENT/
    | ^security/
  )

# Lenient settings — this codebase uses stdlib-only with minimal type
# annotations. Strict checking is deferred to a future phase.
ignore_missing_imports = True
follow_untyped_imports = False
no_implicit_optional = False
check_untyped_defs = False
disallow_untyped_defs = False
warn_return_any = False
disable_error_code = var-annotated, attr-defined, assignment, misc, union-attr, import-untyped
